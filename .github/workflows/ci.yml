name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run full OS/Python test matrix"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  check:
    name: Full check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Make check script executable
        run: chmod +x scripts/check

      - name: Full check
        run: ./scripts/check

  package-verify:
    name: Package verify
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build deps
        run: |
          python -m pip install -U pip build

      - name: Build wheel
        run: python -m build

      - name: Verify wheel install
        run: |
          python -m venv .pkgtest
          . .pkgtest/bin/activate
          python -m pip install -U pip
          python -m pip install dist/*.whl
          python -c "import answer_engineering; import ae_paper_reproduction"
